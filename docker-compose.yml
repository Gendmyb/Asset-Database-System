# Asset Database System — Docker Compose
# 生产部署: PostgreSQL 16 + API Server (含嵌入前端)

services:
  # ---- PostgreSQL 16 (SOT) ----
  postgres:
    image: postgres:16-alpine
    container_name: asset-db-pg
    environment:
      POSTGRES_DB: assetdb
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d assetdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- API Server (Go + Gin, 含嵌入前端 SPA) ----
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: asset-db-api
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://app_user:app_pass@postgres:5432/assetdb?sslmode=disable&search_path=assets"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: assetdb
      DB_USER: app_user
      DATABASE_PASSWORD: app_pass
      DEMO: "false"
      # Generate a seed with: openssl rand -hex 32
      JWT_ED25519_SEED: ""
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
